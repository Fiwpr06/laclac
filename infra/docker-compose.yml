name: lac-lac

services:
  mongodb:
    image: mongo:7
    container_name: laclac-mongodb
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: lac_lac
    volumes:
      - mongodb_data:/data/db
    networks:
      - laclac-net

  redis:
    image: redis:7-alpine
    container_name: laclac-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - laclac-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: laclac-rabbitmq
    restart: unless-stopped
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - laclac-net

  auth-service:
    build:
      context: ../
      dockerfile: services/auth-service/Dockerfile
    container_name: laclac-auth-service
    env_file:
      - ../.env
    environment:
      PORT: 3001
      SERVICE_NAME: auth-service
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/lac_lac}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rabbitmq:5672}
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - laclac-net

  food-service:
    build:
      context: ../
      dockerfile: services/food-service/Dockerfile
    container_name: laclac-food-service
    env_file:
      - ../.env
    environment:
      PORT: 3002
      SERVICE_NAME: food-service
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/lac_lac}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - mongodb
      - redis
    networks:
      - laclac-net

  action-service:
    build:
      context: ../
      dockerfile: services/action-service/Dockerfile
    container_name: laclac-action-service
    env_file:
      - ../.env
    environment:
      PORT: 3003
      SERVICE_NAME: action-service
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/lac_lac}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rabbitmq:5672}
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - laclac-net

  rec-service:
    build:
      context: ../
      dockerfile: services/rec-service/Dockerfile
    container_name: laclac-rec-service
    env_file:
      - ../.env
    environment:
      PORT: 3004
      SERVICE_NAME: rec-service
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/lac_lac}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - mongodb
      - redis
    networks:
      - laclac-net

  media-service:
    build:
      context: ../
      dockerfile: services/media-service/Dockerfile
    container_name: laclac-media-service
    env_file:
      - ../.env
    environment:
      PORT: 3005
      SERVICE_NAME: media-service
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/lac_lac}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - mongodb
      - redis
    networks:
      - laclac-net

  nginx:
    image: nginx:1.27-alpine
    container_name: laclac-nginx
    restart: unless-stopped
    ports:
      - '${GATEWAY_PORT:-3100}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - food-service
      - action-service
      - rec-service
      - media-service
    networks:
      - laclac-net

networks:
  laclac-net:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:
